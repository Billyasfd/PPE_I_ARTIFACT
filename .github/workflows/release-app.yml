name: Release App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Release
        run: |
          chmod +x scripts/prepare-release.sh
          ./scripts/prepare-release.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-binary
          path: dist/app.exe